function load(k,def) { try { const d=localStorage.getItem(k); return d?JSON.parse(d):def; } catch{return def;} }

// ============================================
// SINCRONIZACION FIREBASE (Realtime Database)
// Los datos viven en localStorage; si hay config de
// Firebase, cada save() se replica a la nube y los
// cambios remotos actualizan la app en vivo.
// ============================================
const SYNC_KEYS = {
"bm_fighters_v4": [],
"bm_matchups_v3": [],
"bm_expenses_v3": [],
"bm_tickets_v3": [],
"bm_tickets_v4": [],
"bm_tc_v4": {general:0,ringside:0,vip:0},
"bm_event_label": "La Velada — próxima fecha por definir",
};
const FB = { db:null, ready:false };
function fbPath(k){ return "sangre_nueva/"+k; }

function parseFbConfig(t){
t=(t||"").trim();
const m=t.match(/\{[\s\S]*\}/); if(m) t=m[0];
try{ return JSON.parse(t); }catch(e){}
try{ return (new Function("return ("+t+")"))(); }catch(e){ return null; }
}

function initFirebase(cfg, onStatus, onRemote){
try{
if(typeof firebase==="undefined"){ onStatus("error"); alert("No se pudieron cargar las librerías de Firebase. Revisa tu conexión a internet."); return false; }
if(!cfg || !cfg.apiKey){ onStatus("error"); alert("Configuración inválida. Pega el bloque firebaseConfig completo."); return false; }
if(!cfg.databaseURL){ onStatus("error"); alert("A tu configuración le falta databaseURL.\n\nEn la consola de Firebase crea la Realtime Database (parte C de la guía) y vuelve a copiar la config — debe incluir la línea databaseURL."); return false; }
if(!firebase.apps.length) firebase.initializeApp(cfg);
FB.db = firebase.database();
onStatus("connecting");
firebase.auth().signInAnonymously().then(()=>{
FB.ready = true; onStatus("on");
Object.keys(SYNC_KEYS).forEach(k=>{
const ref = FB.db.ref(fbPath(k));
ref.once("value").then(snap=>{
// Primera conexion: si la nube esta vacia y aqui hay datos, subimos los locales
if(snap.val()===null){
const localRaw = localStorage.getItem(k);
if(localRaw){ try{ ref.set(JSON.parse(localRaw)); }catch(e){} }
}
ref.on("value", s=>{
const val = s.val();
const remote = (val===null || val===undefined) ? SYNC_KEYS[k] : val;
const remoteRaw = JSON.stringify(remote);
if(localStorage.getItem(k) === remoteRaw) return; // ya estamos al dia (o fue nuestro propio cambio)
localStorage.setItem(k, remoteRaw);
onRemote(k, remote);
});
});
});
}).catch(e=>{
onStatus("error");
alert("No se pudo iniciar sesión anónima en Firebase: "+e.message+"\n\nActiva el proveedor 'Anónimo' en Authentication (parte B de la guía).");
});
return true;
}catch(e){ onStatus("error"); alert("Error al conectar con Firebase: "+e.message); return false; }
}

function save(k,v) {
localStorage.setItem(k, JSON.stringify(v));
if(FB.ready && Object.prototype.hasOwnProperty.call(SYNC_KEYS,k)){
try{ FB.db.ref(fbPath(k)).set(JSON.parse(JSON.stringify(v))); }catch(e){}
}
}

function loadFighters() {
const d = load("bm_fighters_v4", null);
if (d) return d;
save("bm_fighters_v4", DEMO_FIGHTERS);
return [...DEMO_FIGHTERS];
}

// ============================================
// MATCHMAKING ALGORITHM
// ============================================
function analyzeMatch(f1,f2) {
const w=[];
const wd=Math.abs(f1.weightKg-f2.weightKg);
const cat=getCategoryInfo(f1.weightCategory);
const tol=cat?.tolerance||3;
if(f1.weightCategory!==f2.weightCategory) w.push({type:"weight",severity:"high",message:`Categorías distintas: ${getCategoryInfo(f1.weightCategory)?.label} vs ${getCategoryInfo(f2.weightCategory)?.label}`});
else if(wd>tol*2) w.push({type:"weight",severity:"high",message:`Δ${wd.toFixed(1)}kg — diferencia excesiva (tol: ${tol}kg)`});
else if(wd>tol) w.push({type:"weight",severity:"medium",message:`Δ${wd.toFixed(1)}kg (tol: ${tol}kg)`});
if(f1.experienceLevel!==f2.experienceLevel) {
const lvls=["debutante","principiante","amateur","profesional"];
const diff=Math.abs(lvls.indexOf(f1.experienceLevel)-lvls.indexOf(f2.experienceLevel));
if(diff>=2) w.push({type:"experience",severity:"high",message:`${getExperienceInfo(f1.experienceLevel)?.label} vs ${getExperienceInfo(f2.experienceLevel)?.label} - PELIGROSO`});
else w.push({type:"experience",severity:"medium",message:`Niveles: ${getExperienceInfo(f1.experienceLevel)?.label} vs ${getExperienceInfo(f2.experienceLevel)?.label}`});
}
if((f1.sexo||"M")!==(f2.sexo||"M")) w.push({type:"sexo",severity:"high",message:"Sexos distintos — NO EMPAREJAR"});
const minor1=f1.age<18, minor2=f2.age<18;
if(minor1!==minor2) w.push({type:"age",severity:"high",message:`Menor (${minor1?f1.age:f2.age}a) vs adulto (${minor1?f2.age:f1.age}a) - PELIGROSO`});
else if(Math.abs(f1.age-f2.age)>10) w.push({type:"age",severity:"medium",message:`Δ${Math.abs(f1.age-f2.age)} años de edad`});
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()) w.push({type:"same_gym",severity:"low",message:`Misma escuela: ${f1.gym}`});
return w;
}

function getScore(f1,f2) {
let s=100;
if(f1.weightCategory!==f2.weightCategory) s-=50;
s-=Math.abs(f1.weightKg-f2.weightKg)*3;
const lvls=["debutante","principiante","amateur","profesional"];
s-=Math.abs(lvls.indexOf(f1.experienceLevel)-lvls.indexOf(f2.experienceLevel))*25;
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()) s-=15;
if((f1.sexo||"M")!==(f2.sexo||"M")) s-=100;
if((f1.age<18)!==(f2.age<18)) s-=60;
else s-=Math.max(0,Math.abs(f1.age-f2.age)-6)*2;
return Math.max(0,Math.round(s));
}

function autoMatchAll(fighters) {
const used=new Set(); const matchups=[];
const groups={};
fighters.forEach(f=>{const k=(f.sexo||"M")+"_"+f.weightCategory+"_"+f.experienceLevel+"_"+(f.age<18?"jr":"ad");if(!groups[k])groups[k]=[];groups[k].push(f);});
Object.values(groups).forEach(g=>{
g.sort((a,b)=>a.weightKg-b.weightKg);
for(let i=0;i<g.length-1;i+=2){
if(used.has(g[i].id)||used.has(g[i+1].id))continue;
let f1=g[i],f2=g[i+1];
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()&&g.length>i+2){
for(let j=i+2;j<g.length;j++){if(!used.has(g[j].id)&&g[j].gym.toLowerCase()!==f1.gym.toLowerCase()){f2=g[j];break;}}
}
used.add(f1.id);used.add(f2.id);
matchups.push({id:genId(),fighterRedId:f1.id,fighterBlueId:f2.id,roundNumber:matchups.length+1,warnings:analyzeMatch(f1,f2),createdAt:new Date().toISOString()});
}
});
const rem=fighters.filter(f=>!used.has(f.id)).sort((a,b)=>a.weightKg-b.weightKg);
for(let i=0;i<rem.length;i++){
if(used.has(rem[i].id))continue;let best=null,bs=-1;
for(let j=i+1;j<rem.length;j++){if(used.has(rem[j].id))continue;const sc=getScore(rem[i],rem[j]);if(sc>bs){bs=sc;best=rem[j];}}
if(best&&bs>=30){used.add(rem[i].id);used.add(best.id);
matchups.push({id:genId(),fighterRedId:rem[i].id,fighterBlueId:best.id,roundNumber:matchups.length+1,warnings:analyzeMatch(rem[i],best),createdAt:new Date().toISOString()});
}
}
return matchups;
}


// ============================================
// SORTEO ALEATORIO
// ============================================
function shuffle(arr) {
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
return a;
}

function sorteoMatch(fighters) {
const used=new Set(); const matchups=[];
const groups={};
fighters.forEach(f=>{const k=(f.sexo||"M")+"_"+f.weightCategory+"_"+f.experienceLevel+"_"+(f.age<18?"jr":"ad");if(!groups[k])groups[k]=[];groups[k].push(f);});
Object.values(groups).forEach(g=>{
const sh=shuffle(g.filter(f=>!used.has(f.id)));
for(let i=0;i<sh.length-1;i+=2){
let f1=sh[i],f2=sh[i+1];
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()){
for(let j=i+2;j<sh.length;j++){if(!used.has(sh[j].id)&&sh[j].gym.toLowerCase()!==f1.gym.toLowerCase()){[sh[i+1],sh[j]]=[sh[j],sh[i+1]];f2=sh[i+1];break;}}
}
used.add(f1.id);used.add(f2.id);
matchups.push({id:genId(),fighterRedId:f1.id,fighterBlueId:f2.id,roundNumber:matchups.length+1,warnings:analyzeMatch(f1,f2),createdAt:new Date().toISOString()});
}
});
const rem=shuffle(fighters.filter(f=>!used.has(f.id)));
for(let i=0;i<rem.length-1;i+=2){
if(used.has(rem[i].id)||used.has(rem[i+1].id))continue;
const sc=getScore(rem[i],rem[i+1]);
if(sc>=20){used.add(rem[i].id);used.add(rem[i+1].id);
matchups.push({id:genId(),fighterRedId:rem[i].id,fighterBlueId:rem[i+1].id,roundNumber:matchups.length+1,warnings:analyzeMatch(rem[i],rem[i+1]),createdAt:new Date().toISOString()});}
}
return matchups;
}

</div>

function ExpensesView({expenses,setExpenses}) {

const [amount,setAmount]=useState("");
const [status,setStatus]=useState("pendiente");
const [method,setMethod]=useState("Efectivo");

function resetForm(){setName("");setAmount("");setStatus("pendiente");setMethod("Efectivo");setEditId(null);setShowForm(false);}

function startEdit(exp){setEditId(exp.id);setName(exp.name);setAmount(exp.amount.toString());setStatus(exp.status);setMethod(exp.method);setShowForm(true);window.scrollTo(0,0);}

function submit(e){
e.preventDefault();
if(!name.trim()||!amount) return;
let updated;
if(editId){updated=expenses.map(x=>x.id===editId?{...x,name:name.trim(),amount:parseFloat(amount),status,method}:x);}
else{updated=[...expenses,{id:genId(),name:name.trim(),amount:parseFloat(amount),status,method,createdAt:new Date().toISOString()}];}
setExpenses(updated); save("bm_expenses_v3",updated); resetForm();
}

function del(id){if(confirmDel===id){const u=expenses.filter(x=>x.id!==id);setExpenses(u);save("bm_expenses_v3",u);setConfirmDel(null);}else{setConfirmDel(id);setTimeout(()=>setConfirmDel(null),3000);}}

const u=expenses.map(x=>x.id===id?{...x,status:x.status==="pagado"?"pendiente":"pagado"}:x);
setExpenses(u);save("bm_expenses_v3",u);
}

<div className="bg-green-900/20 border border-green-800/30 rounded-lg p-2.5 text-center"><p className="text-[10px] text-green-400 uppercase">Pagado</p><p className="text-green-400 font-bold text-sm">{fmt$(totalPagado)}</p></div>
<div className="bg-red-900/20 border border-red-800/30 rounded-lg p-2.5 text-center"><p className="text-[10px] text-red-400 uppercase">Pendiente</p><p className="text-red-400 font-bold text-sm">{fmt$(totalPendiente)}</p></div>
</div>}

{showForm&&<form onSubmit={submit} className="bg-gray-800/40 border border-gray-700 rounded-xl p-4 space-y-3 fade-in">

</div>

{expenses.map(exp=>(
<div key={exp.id} className="bg-gray-800/60 border border-gray-700 rounded-lg p-3 fade-in">

<button onClick={()=>del(exp.id)} className={"p-1.5 transition-colors "+(confirmDel===exp.id?"text-red-400":"text-gray-500 hover:text-red-400")}><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
</div>
</div>
{confirmDel===exp.id&&<p className="text-red-400 text-xs mt-1 fade-in">{"⚠️"} Toca de nuevo para eliminar</p>}

))}
</div>
</div>
);
}

setTickets(updated);save("bm_tickets_v3",updated);resetForm();
}

function DashboardView({expenses,tickets}) {
const totalGastos=expenses.reduce((s,x)=>s+x.amount,0);
const gastosPagados=expenses.filter(x=>x.status==="pagado").reduce((s,x)=>s+x.amount,0);
const gastosPendientes=totalGastos-gastosPagados;

const totalVentas=tickets.reduce((s,t)=>s+t.total,0);
const ventasCobradas=tickets.filter(t=>t.paid==="pagado").reduce((s,t)=>s+t.total,0);
const ventasPendientes=totalVentas-ventasCobradas;

const ganancia=totalVentas-totalGastos;
const gananciaCobrada=ventasCobradas-gastosPagados;

const totalBoletos=tickets.reduce((s,t)=>s+t.qty,0);
const prevCount=tickets.filter(t=>t.type==="preventa").reduce((s,t)=>s+t.qty,0);
const puertaCount=tickets.filter(t=>t.type==="puerta").reduce((s,t)=>s+t.qty,0);

const efectivoVentas=tickets.filter(t=>t.method==="Efectivo").reduce((s,t)=>s+t.total,0);
const transVentas=tickets.filter(t=>t.method==="Transferencia").reduce((s,t)=>s+t.total,0);

// Bar chart helper
function Bar({label,value,max,color}){
const pct=max>0?Math.round(value/max*100):0;
return <div className="space-y-1"><div className="flex justify-between text-xs"><span className="text-gray-400">{label}</span><span className="text-white font-medium">{fmt$(value)}</span></div><div className="w-full bg-gray-700 rounded-full h-2.5"><div className="h-2.5 rounded-full transition-all duration-500" style={{width:pct+"%",backgroundColor:color}}/></div></div>;
}

return (
<div className="space-y-4">
<h2 className="text-xl font-bold text-white">Dashboard</h2>

{/* Balance principal */}
<div className={"rounded-xl border p-5 text-center "+(ganancia>=0?"bg-green-900/10 border-green-800/30":"bg-red-900/10 border-red-800/30")}>
<p className="text-xs text-gray-400 uppercase tracking-wider">Ganancia Neta Estimada</p>
<p className={"text-3xl font-black mt-1 "+(ganancia>=0?"text-green-400":"text-red-400")}>{ganancia>=0?"+":""}{fmt$(ganancia)}</p>
<p className="text-xs text-gray-500 mt-1">En mano: <span className={gananciaCobrada>=0?"text-green-400":"text-red-400"}>{gananciaCobrada>=0?"+":""}{fmt$(gananciaCobrada)}</span></p>
</div>

{/* Resumen en 2 columnas */}
<div className="grid grid-cols-2 gap-3">
<div className="bg-gray-800/60 border border-gray-700 rounded-xl p-3 space-y-2">
<h3 className="text-sm font-semibold text-red-400 flex items-center gap-1">{"\u{1F4C9}"} Gastos</h3>
<p className="text-white font-bold text-xl">{fmt$(totalGastos)}</p>
<div className="space-y-1 text-xs">
<div className="flex justify-between"><span className="text-green-400">Pagado</span><span className="text-gray-300">{fmt$(gastosPagados)}</span></div>
<div className="flex justify-between"><span className="text-red-400">Pendiente</span><span className="text-gray-300">{fmt$(gastosPendientes)}</span></div>
</div>
{totalGastos>0&&<div className="w-full bg-gray-700 rounded-full h-2"><div className="h-2 rounded-full bg-green-500 transition-all duration-500" style={{width:Math.round(gastosPagados/totalGastos*100)+"%"}}/></div>}
</div>
<div className="bg-gray-800/60 border border-gray-700 rounded-xl p-3 space-y-2">
<h3 className="text-sm font-semibold text-green-400 flex items-center gap-1">{"\u{1F4C8}"} Ventas</h3>
<p className="text-white font-bold text-xl">{fmt$(totalVentas)}</p>
<div className="space-y-1 text-xs">
<div className="flex justify-between"><span className="text-green-400">Cobrado</span><span className="text-gray-300">{fmt$(ventasCobradas)}</span></div>
<div className="flex justify-between"><span className="text-red-400">Por cobrar</span><span className="text-gray-300">{fmt$(ventasPendientes)}</span></div>
</div>
{totalVentas>0&&<div className="w-full bg-gray-700 rounded-full h-2"><div className="h-2 rounded-full bg-green-500 transition-all duration-500" style={{width:Math.round(ventasCobradas/totalVentas*100)+"%"}}/></div>}
</div>
</div>

{/* Boletos */}
<div className="bg-gray-800/60 border border-gray-700 rounded-xl p-4 space-y-3">
<h3 className="text-sm font-semibold text-yellow-500">{"\u{1F3AB}"} Boletos vendidos: {totalBoletos}</h3>
<div className="space-y-2">
<Bar label={"Preventa ("+prevCount+")"} value={prevCount*TICKET_PRICES.preventa} max={totalVentas||1} color="#A855F7"/>
<Bar label={"Puerta ("+puertaCount+")"} value={puertaCount*TICKET_PRICES.puerta} max={totalVentas||1} color="#F97316"/>
</div>
</div>

{/* Métodos de pago */}
{totalVentas>0&&<div className="bg-gray-800/60 border border-gray-700 rounded-xl p-4 space-y-3">
<h3 className="text-sm font-semibold text-blue-400">{"\u{1F4B3}"} Métodos de pago (ventas)</h3>
<div className="space-y-2">
<Bar label="Efectivo" value={efectivoVentas} max={totalVentas} color="#22C55E"/>
<Bar label="Transferencia" value={transVentas} max={totalVentas} color="#3B82F6"/>
</div>
</div>}

{/* Desglose gastos */}
{expenses.length>0&&<div className="bg-gray-800/60 border border-gray-700 rounded-xl p-4 space-y-3">
<h3 className="text-sm font-semibold text-red-400">{"\u{1F4CA}"} Desglose de gastos</h3>
<div className="space-y-2">
{expenses.sort((a,b)=>b.amount-a.amount).map(e=><Bar key={e.id} label={e.name+(e.status==="pendiente"?" ⏳":"")} value={e.amount} max={expenses[0]?.amount||1} color={e.status==="pagado"?"#22C55E":"#EF4444"}/>)}
</div>
</div>}

{!expenses.length&&!tickets.length&&<div className="text-center py-8"><p className="text-gray-500">Agrega gastos y ventas para ver el dashboard</p></div>}
</div>
);
}

function QRDisplay({data,size=120}){

try{new window.QRCode(ref.current,{text:data||" ",width:size,height:size,colorDark:"#000",colorLight:"#fff"});}catch(e){}
}
},[data,size]);
return <div ref={ref} style={{width:size,height:size}}/>;
}

function TicketsManager({tickets,setTickets}){
const [subView,setSubView]=useState("sell");
const kpis=useMemo(()=>{
const byType={},byPayment={};
tickets.forEach(t=>{byType[t.ticketType]=(byType[t.ticketType]||0)+1;byPayment[t.paymentMethod]=(byPayment[t.paymentMethod]||0)+t.price;});
return{total:tickets.length,revenue:tickets.reduce((s,t)=>s+t.price,0),byType,byPayment,checkedIn:tickets.filter(t=>t.status==="ingresado").length};
},[tickets]);

function addTicket(data){
const cur=loadCountersV4();
const nc={...cur,[data.ticketType]:(cur[data.ticketType]||0)+1};
const tt=TICKET_TYPES_V2.find(x=>x.key===data.ticketType);
const prefix=tt.label.substring(0,3).toUpperCase();
const newT={...data,id:prefix+"-"+padN(nc[data.ticketType]),price:tt.price,status:"activo",createdAt:new Date().toISOString(),checkedInAt:null};
const updated=[...tickets,newT];
setTickets(updated);saveTicketsV4(updated);
saveCountersV4(nc);
return newT;
}
function checkIn(id){
const updated=tickets.map(t=>t.id===id?{...t,status:"ingresado",checkedInAt:new Date().toISOString()}:t);
setTickets(updated);saveTicketsV4(updated);
}
const tabs=[{k:"sell",label:"Vender",e:"🎫"},{k:"history",label:"Historial",e:"📋"},{k:"checkin",label:"Check-in",e:"✅"}];
return(
<div className="space-y-4">
<h2 className="text-xl font-black text-white" style={{fontFamily:"'Bebas Neue',Impact,sans-serif",letterSpacing:"3px"}}>🎫 ENTRADAS</h2>
<div className="rounded-xl p-3 space-y-2" style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(255,255,255,0.07)"}}>
<div className="flex justify-between items-center">
<span className="text-[11px] text-gray-400 uppercase tracking-wider">Capacidad</span>
<span className="text-sm font-bold text-white">{kpis.total} <span className="text-gray-500 font-normal">/ {MAX_CAP}</span></span>
</div>
<div className="w-full h-2 rounded-full overflow-hidden" style={{background:"rgba(255,255,255,0.08)"}}>
<div className="h-2 rounded-full transition-all duration-700" style={{width:Math.min(100,kpis.total/MAX_CAP*100)+"%",background:"linear-gradient(90deg,#DC2626,#F59E0B)"}}/>
</div>
<div className="flex gap-3">{TICKET_TYPES_V2.map(tt=><span key={tt.key} className="text-[10px] font-semibold" style={{color:tt.color}}>{tt.icon} {tt.label}: {kpis.byType[tt.key]||0}</span>)}</div>
</div>
<div className="grid grid-cols-2 gap-2">
<div className="rounded-xl p-3" style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(245,158,11,0.2)"}}>
<p className="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Ingresos</p>
<p className="text-xl font-black text-yellow-500" style={{fontFamily:"'Bebas Neue',Impact,sans-serif"}}>{fmt$(kpis.revenue)}</p>
<div className="mt-1 space-y-0.5">{Object.entries(kpis.byPayment).filter(([,v])=>v>0).map(([m,v])=><p key={m} className="text-[10px] text-gray-500">{m}: {fmt$(v)}</p>)}</div>
</div>
<div className="rounded-xl p-3" style={{background:"rgba(0,0,0,0.4)",border:"1px solid rgba(34,197,94,0.2)"}}>
<p className="text-[10px] text-gray-400 uppercase tracking-wider mb-1">Check-in</p>
<p className="text-xl font-black text-green-400" style={{fontFamily:"'Bebas Neue',Impact,sans-serif"}}>{kpis.checkedIn} <span className="text-sm text-gray-600 font-normal">/ {kpis.total}</span></p>
<p className="text-[10px] text-gray-500 mt-1">Pendientes: {kpis.total-kpis.checkedIn}</p>
</div>
</div>
<div className="flex rounded-xl overflow-hidden" style={{background:"rgba(0,0,0,0.35)",border:"1px solid rgba(255,255,255,0.07)"}}>
{tabs.map(s=><button key={s.k} onClick={()=>setSubView(s.k)} className="flex-1 py-2.5 text-xs font-bold transition-all"
style={subView===s.k?{background:"rgba(220,38,38,0.25)",color:"white",borderBottom:"2px solid #DC2626"}:{color:"#4B5563"}}>{s.e} {s.label}</button>)}
</div>
{subView==="sell" &&<SellView onAdd={addTicket}/>}

{subView==="checkin" &&<CheckInView tickets={tickets} onCheckIn={checkIn}/>}
</div>
);
}

function App() {
const [fighters,setFighters]=useState([]);
const [matchups,setMatchups]=useState([]);
const [expenses,setExpenses]=useState([]);
const [tickets,setTickets]=useState([]);
const [ticketsNew,setTicketsNew]=useState([]);
const [view,setView]=useState("list");
const [editF,setEditF]=useState(null);
const [eventLabel,setEventLabel]=useState(()=>load("bm_event_label","La Velada — próxima fecha por definir"));
const [sync,setSync]=useState(()=>localStorage.getItem("bm_fb_config")?"connecting":"off");

function applyRemote(k,val){
if(k==="bm_fighters_v4") setFighters(val);
else if(k==="bm_matchups_v3") setMatchups(val);
else if(k==="bm_expenses_v3") setExpenses(val);
else if(k==="bm_tickets_v3") setTickets(val);
else if(k==="bm_tickets_v4") setTicketsNew(val);
else if(k==="bm_event_label") setEventLabel(val);
// bm_tc_v4 se lee directo de localStorage al emitir boletas
}

function toggleSync(){
const raw=localStorage.getItem("bm_fb_config");
if(raw){
if(confirm("¿Desconectar la sincronización en la nube en este dispositivo?\n\nLos datos locales se conservan; solo dejan de sincronizarse.")){
localStorage.removeItem("bm_fb_config");
location.reload();
}
return;
}
const t=prompt("Pega aquí tu firebaseConfig (el bloque { apiKey: ..., databaseURL: ... } de la consola de Firebase).\n\nSi aún no lo tienes, sigue la GUÍA incluida.");
if(!t) return;
const cfg=parseFbConfig(t);
if(!cfg){ alert("No pude leer la configuración. Copia el bloque completo entre llaves { }."); return; }
if(initFirebase(cfg, setSync, applyRemote)){
localStorage.setItem("bm_fb_config", JSON.stringify(cfg));
}
}

useEffect(()=>{
setFighters(loadFighters());
setMatchups(load("bm_matchups_v3",[]));
setExpenses(load("bm_expenses_v3",[]));
setTickets(load("bm_tickets_v3",[]));
setTicketsNew(loadTicketsV4());
const raw=localStorage.getItem("bm_fb_config");
if(raw){ try{ initFirebase(JSON.parse(raw), setSync, applyRemote); }catch(e){ setSync("error"); } }
},[]);

function addFighter(f){let u;if(editF){u=fighters.map(x=>x.id===f.id?f:x);setEditF(null);}else{u=[...fighters,f];}setFighters(u);save("bm_fighters_v4",u);setView("list");}
function editFighter(f){setEditF(f);setView("register");window.scrollTo(0,0);}
function delFighter(id){const u=fighters.filter(f=>f.id!==id);setFighters(u);save("bm_fighters_v4",u);}
function cancel(){setEditF(null);setView("list");}

function handleExport(){const d={fighters,matchups,expenses,tickets};const b=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download="evento_"+new Date().toISOString().split("T")[0]+".json";a.click();URL.revokeObjectURL(u);}
function handleImport(){const i=document.createElement("input");i.type="file";i.accept=".json";i.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.fighters){setFighters(d.fighters);save("bm_fighters_v4",d.fighters);}if(d.matchups){setMatchups(d.matchups);save("bm_matchups_v3",d.matchups);}if(d.expenses){setExpenses(d.expenses);save("bm_expenses_v3",d.expenses);}if(d.tickets){setTickets(d.tickets);save("bm_tickets_v3",d.tickets);}}catch{alert("JSON inválido");}};r.readAsText(f);};i.click();}
function resetDemo(){if(!confirm("¿Restaurar los 17 atletas originales y borrar peleas, gastos y ventas?"))return;setFighters([...SN_FIGHTERS]);save("bm_fighters_v4",SN_FIGHTERS);setMatchups([]);save("bm_matchups_v3",[]);setExpenses([]);save("bm_expenses_v3",[]);setTickets([]);save("bm_tickets_v3",[]);setTicketsNew([]);saveTicketsV4([]);saveCountersV4({general:0,ringside:0,vip:0});}

const nav=(active)=>"flex-1 py-2.5 flex flex-col items-center gap-0.5 transition-colors "+(active?"text-yellow-500":"text-gray-500 active:text-gray-300");

return (
<div className="app-root" style={{maxWidth:"512px",margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden"}}>
<header style={{flexShrink:0,borderBottom:"1px solid rgba(212,160,23,0.35)",zIndex:10}}>
<div className="flex justify-end px-3 pt-1.5 pb-0">

<button onClick={toggleSync} className={"text-[10px] px-1.5 py-0.5 rounded transition-colors font-semibold "+(sync==="on"?"text-green-400":sync==="connecting"?"text-yellow-400":sync==="error"?"text-red-400":"text-gray-500 hover:text-yellow-500")}>
