function initFirebaseApp(cfg){

function startFirebaseSync(onStatus, onRemote){
if(FB.ready) return;
onStatus("connecting");
FB.ready = true; onStatus("on");
Object.keys(SYNC_KEYS).forEach(k=>{
const ref = FB.db.ref(fbPath(k));
ref.once("value").then(snap=>{
// Primera conexion: si la nube esta vacia y aqui hay datos, subimos los locales
if(snap.val()===null){
const localRaw = localStorage.getItem(k);
if(localRaw){ try{ ref.set(JSON.parse(localRaw)); }catch(e){} }
}
ref.on("value", s=>{
const val = s.val();
const remote = (val===null || val===undefined) ? SYNC_KEYS[k] : val;
const remoteRaw = JSON.stringify(remote);
if(localStorage.getItem(k) === remoteRaw) return; // ya estamos al dia (o fue nuestro propio cambio)
localStorage.setItem(k, remoteRaw);
onRemote(k, remote);
});
});
});
}

function analyzeMatch(f1,f2) {
const w=[];
const wd=Math.abs(f1.weightKg-f2.weightKg);
const cat=getCategoryInfo(f1.weightCategory);
const tol=cat?.tolerance||3;
if(f1.weightCategory!==f2.weightCategory) w.push({type:"weight",severity:"high",message:`Categorías distintas: ${getCategoryInfo(f1.weightCategory)?.label} vs ${getCategoryInfo(f2.weightCategory)?.label}`});
else if(wd>tol*2) w.push({type:"weight",severity:"high",message:`Δ${wd.toFixed(1)}kg — diferencia excesiva (tol: ${tol}kg)`});
else if(wd>tol) w.push({type:"weight",severity:"medium",message:`Δ${wd.toFixed(1)}kg (tol: ${tol}kg)`});
if(f1.experienceLevel!==f2.experienceLevel) {
const lvls=["debutante","principiante","amateur","profesional"];
const diff=Math.abs(lvls.indexOf(f1.experienceLevel)-lvls.indexOf(f2.experienceLevel));
if(diff>=2) w.push({type:"experience",severity:"high",message:`${getExperienceInfo(f1.experienceLevel)?.label} vs ${getExperienceInfo(f2.experienceLevel)?.label} - PELIGROSO`});
else w.push({type:"experience",severity:"medium",message:`Niveles: ${getExperienceInfo(f1.experienceLevel)?.label} vs ${getExperienceInfo(f2.experienceLevel)?.label}`});
}
if((f1.sexo||"M")!==(f2.sexo||"M")) w.push({type:"sexo",severity:"high",message:"Sexos distintos — NO EMPAREJAR"});
const minor1=f1.age<18, minor2=f2.age<18;
if(minor1!==minor2) w.push({type:"age",severity:"high",message:`Menor (${minor1?f1.age:f2.age}a) vs adulto (${minor1?f2.age:f1.age}a) - PELIGROSO`});
else if(Math.abs(f1.age-f2.age)>10) w.push({type:"age",severity:"medium",message:`Δ${Math.abs(f1.age-f2.age)} años de edad`});
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()) w.push({type:"same_gym",severity:"low",message:`Misma escuela: ${f1.gym}`});
return w;
}

function getScore(f1,f2) {
let s=100;
if(f1.weightCategory!==f2.weightCategory) s-=50;
s-=Math.abs(f1.weightKg-f2.weightKg)*3;
const lvls=["debutante","principiante","amateur","profesional"];
s-=Math.abs(lvls.indexOf(f1.experienceLevel)-lvls.indexOf(f2.experienceLevel))*25;
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()) s-=15;
if((f1.sexo||"M")!==(f2.sexo||"M")) s-=100;
if((f1.age<18)!==(f2.age<18)) s-=60;
else s-=Math.max(0,Math.abs(f1.age-f2.age)-6)*2;
return Math.max(0,Math.round(s));
}

function autoMatchAll(fighters) {
const used=new Set(); const matchups=[];
const groups={};
fighters.forEach(f=>{const k=(f.sexo||"M")+"_"+f.weightCategory+"_"+f.experienceLevel+"_"+(f.age<18?"jr":"ad");if(!groups[k])groups[k]=[];groups[k].push(f);});
Object.values(groups).forEach(g=>{
g.sort((a,b)=>a.weightKg-b.weightKg);
for(let i=0;i<g.length-1;i+=2){
if(used.has(g[i].id)||used.has(g[i+1].id))continue;
let f1=g[i],f2=g[i+1];
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()&&g.length>i+2){
for(let j=i+2;j<g.length;j++){if(!used.has(g[j].id)&&g[j].gym.toLowerCase()!==f1.gym.toLowerCase()){f2=g[j];break;}}
}
used.add(f1.id);used.add(f2.id);
matchups.push({id:genId(),fighterRedId:f1.id,fighterBlueId:f2.id,roundNumber:matchups.length+1,warnings:analyzeMatch(f1,f2),createdAt:new Date().toISOString()});
}
});
const rem=fighters.filter(f=>!used.has(f.id)).sort((a,b)=>a.weightKg-b.weightKg);
for(let i=0;i<rem.length;i++){
if(used.has(rem[i].id))continue;let best=null,bs=-1;
for(let j=i+1;j<rem.length;j++){if(used.has(rem[j].id))continue;const sc=getScore(rem[i],rem[j]);if(sc>bs){bs=sc;best=rem[j];}}
if(best&&bs>=30){used.add(rem[i].id);used.add(best.id);
matchups.push({id:genId(),fighterRedId:rem[i].id,fighterBlueId:best.id,roundNumber:matchups.length+1,warnings:analyzeMatch(rem[i],best),createdAt:new Date().toISOString()});
}
}
return matchups;
}

function shuffle(arr) {
const a=[...arr];
for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
return a;
}

function sorteoMatch(fighters) {
const used=new Set(); const matchups=[];
const groups={};
fighters.forEach(f=>{const k=(f.sexo||"M")+"_"+f.weightCategory+"_"+f.experienceLevel+"_"+(f.age<18?"jr":"ad");if(!groups[k])groups[k]=[];groups[k].push(f);});
Object.values(groups).forEach(g=>{
const sh=shuffle(g.filter(f=>!used.has(f.id)));
for(let i=0;i<sh.length-1;i+=2){
let f1=sh[i],f2=sh[i+1];
if(f1.gym.toLowerCase()===f2.gym.toLowerCase()){
for(let j=i+2;j<sh.length;j++){if(!used.has(sh[j].id)&&sh[j].gym.toLowerCase()!==f1.gym.toLowerCase()){[sh[i+1],sh[j]]=[sh[j],sh[i+1]];f2=sh[i+1];break;}}
}
used.add(f1.id);used.add(f2.id);
matchups.push({id:genId(),fighterRedId:f1.id,fighterBlueId:f2.id,roundNumber:matchups.length+1,warnings:analyzeMatch(f1,f2),createdAt:new Date().toISOString()});
}
});
const rem=shuffle(fighters.filter(f=>!used.has(f.id)));
for(let i=0;i<rem.length-1;i+=2){
if(used.has(rem[i].id)||used.has(rem[i+1].id))continue;
const sc=getScore(rem[i],rem[i+1]);
if(sc>=20){used.add(rem[i].id);used.add(rem[i+1].id);
matchups.push({id:genId(),fighterRedId:rem[i].id,fighterBlueId:rem[i+1].id,roundNumber:matchups.length+1,warnings:analyzeMatch(rem[i],rem[i+1]),createdAt:new Date().toISOString()});}
}
return matchups;
}

function ExpensesView({expenses,setExpenses}) {
const [showForm,setShowForm]=useState(false);
const [editId,setEditId]=useState(null);
const [name,setName]=useState("");
const [amount,setAmount]=useState("");
const [status,setStatus]=useState("pendiente");
const [method,setMethod]=useState("Efectivo");
const [confirmDel,setConfirmDel]=useState(null);

function resetForm(){setName("");setAmount("");setStatus("pendiente");setMethod("Efectivo");setEditId(null);setShowForm(false);}

function startEdit(exp){setEditId(exp.id);setName(exp.name);setAmount(exp.amount.toString());setStatus(exp.status);setMethod(exp.method);setShowForm(true);window.scrollTo(0,0);}

function submit(e){
e.preventDefault();
if(!name.trim()||!amount) return;
let updated;
if(editId){updated=expenses.map(x=>x.id===editId?{...x,name:name.trim(),amount:parseFloat(amount),status,method}:x);}
else{updated=[...expenses,{id:genId(),name:name.trim(),amount:parseFloat(amount),status,method,createdAt:new Date().toISOString()}];}
setExpenses(updated); save("bm_expenses_v3",updated); resetForm();
}

function del(id){if(confirmDel===id){const u=expenses.filter(x=>x.id!==id);setExpenses(u);save("bm_expenses_v3",u);setConfirmDel(null);}else{setConfirmDel(id);setTimeout(()=>setConfirmDel(null),3000);}}

function toggleStatus(id){
const u=expenses.map(x=>x.id===id?{...x,status:x.status==="pagado"?"pendiente":"pagado"}:x);
setExpenses(u);save("bm_expenses_v3",u);
}

const totalGastos=expenses.reduce((s,x)=>s+x.amount,0);
const totalPagado=expenses.filter(x=>x.status==="pagado").reduce((s,x)=>s+x.amount,0);
const totalPendiente=totalGastos-totalPagado;

const ic="w-full px-3 py-2.5 bg-gray-800 border border-gray-600 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-yellow-500 text-base";

return (
<div className="space-y-4">
<div className="flex items-center justify-between">
<h2 className="text-xl font-bold text-white">Gastos</h2>
<button onClick={()=>{resetForm();setShowForm(!showForm);}} className="text-xs bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg font-medium">{showForm?"Cancelar":"+ Agregar"}</button>
</div>

{/* Resumen rápido */}
{expenses.length>0&&<div className="grid grid-cols-3 gap-2">
<div className="bg-gray-800/60 border border-gray-700 rounded-lg p-2.5 text-center"><p className="text-[10px] text-gray-500 uppercase">Total</p><p className="text-white font-bold text-sm">{fmt$(totalGastos)}</p></div>
<div className="bg-green-900/20 border border-green-800/30 rounded-lg p-2.5 text-center"><p className="text-[10px] text-green-400 uppercase">Pagado</p><p className="text-green-400 font-bold text-sm">{fmt$(totalPagado)}</p></div>
<div className="bg-red-900/20 border border-red-800/30 rounded-lg p-2.5 text-center"><p className="text-[10px] text-red-400 uppercase">Pendiente</p><p className="text-red-400 font-bold text-sm">{fmt$(totalPendiente)}</p></div>
</div>}

{/* Form */}
{showForm&&<form onSubmit={submit} className="bg-gray-800/40 border border-gray-700 rounded-xl p-4 space-y-3 fade-in">
<h3 className="text-sm font-semibold text-gray-300">{editId?"Editar gasto":"Nuevo gasto"}</h3>
<div><label className="block text-xs text-gray-400 mb-1">Concepto</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Sillas, Animador, Ring..." className={ic} required/></div>
<div className="grid grid-cols-2 gap-3">
<div><label className="block text-xs text-gray-400 mb-1">Monto (CLP)</label><input type="number" value={amount} onChange={e=>setAmount(e.target.value)} placeholder="50000" className={ic} required/></div>
<div><label className="block text-xs text-gray-400 mb-1">Método</label><select value={method} onChange={e=>setMethod(e.target.value)} className={ic}>{PAYMENT_METHODS.map(m=><option key={m}>{m}</option>)}</select></div>
</div>
<div><label className="block text-xs text-gray-400 mb-1">Estado</label>
<div className="flex gap-2">
<button type="button" onClick={()=>setStatus("pendiente")} className={"flex-1 py-2 rounded-lg text-sm font-medium border transition-colors "+(status==="pendiente"?"bg-red-600/20 border-red-500 text-red-400":"bg-gray-800 border-gray-600 text-gray-400")}>Pendiente</button>
<button type="button" onClick={()=>setStatus("pagado")} className={"flex-1 py-2 rounded-lg text-sm font-medium border transition-colors "+(status==="pagado"?"bg-green-600/20 border-green-500 text-green-400":"bg-gray-800 border-gray-600 text-gray-400")}>Pagado</button>
</div>
</div>
<button type="submit" className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 rounded-lg">{editId?"Guardar":"Agregar gasto"}</button>
</form>}

{/* Lista */}
{!expenses.length&&!showForm&&<div className="text-center py-12"><p className="text-gray-500">No hay gastos registrados</p></div>}
<div className="space-y-2">
{expenses.map(exp=>(
<div key={exp.id} className="bg-gray-800/60 border border-gray-700 rounded-lg p-3 fade-in">
<div className="flex items-center justify-between">
<div className="flex-1 min-w-0">
<div className="flex items-center gap-2">
<button onClick={()=>toggleStatus(exp.id)} className={"w-5 h-5 rounded border-2 flex items-center justify-center flex-shrink-0 transition-colors "+(exp.status==="pagado"?"bg-green-600 border-green-600":"border-gray-500 hover:border-green-400")}>
{exp.status==="pagado"&&<svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7"/></svg>}
</button>
<span className={"text-sm font-medium "+(exp.status==="pagado"?"text-gray-400 line-through":"text-white")}>{exp.name}</span>
</div>
<div className="flex items-center gap-2 mt-1 ml-7">
<span className="text-xs px-1.5 py-0.5 rounded bg-gray-700 text-gray-300">{exp.method}</span>
<span className={"text-xs px-1.5 py-0.5 rounded "+(exp.status==="pagado"?"bg-green-900/30 text-green-400":"bg-red-900/30 text-red-400")}>{exp.status}</span>
</div>
</div>
<div className="flex items-center gap-2 ml-2">
<span className="text-white font-bold text-sm">{fmt$(exp.amount)}</span>
<button onClick={()=>startEdit(exp)} className="p-1.5 text-gray-500 hover:text-yellow-500"><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/></svg></button>
<button onClick={()=>del(exp.id)} className={"p-1.5 transition-colors "+(confirmDel===exp.id?"text-red-400":"text-gray-500 hover:text-red-400")}><svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg></button>
</div>
</div>
{confirmDel===exp.id&&<p className="text-red-400 text-xs mt-1 fade-in">{"⚠️"} Toca de nuevo para eliminar</p>}
</div>
))}
</div>
</div>
);
}

function QRDisplay({data,size=120}){
const ref=useRef(null);
useEffect(()=>{
if(ref.current&&window.QRCode){
ref.current.innerHTML="";
try{new window.QRCode(ref.current,{text:data||" ",width:size,height:size,colorDark:"#000",colorLight:"#fff"});}catch(e){}

function TicketPreview({ticket}){
const tt=TICKET_TYPES_V2.find(t=>t.key===ticket.ticketType)||TICKET_TYPES_V2[0];
const qrData=location.origin+location.pathname+"?ticket="+encodeURIComponent(ticket.id);
const qrWrapRef=useRef(null);
const busyRef=useRef(false);
const [sharing,setSharing]=useState(false);
const shareText="🥊 Sangre Nueva — La Velada\nEntrada: "+tt.label+"\nBoleta: #"+ticket.id+"\nA nombre de: "+ticket.attendeeName+"\n\nPresenta este código QR en la entrada.";

async function buildTicketCanvas(){
if(document.fonts&&document.fonts.ready) await document.fonts.ready;
const scale=2, W=960, H=440;
const canvas=document.createElement("canvas");
canvas.width=W*scale; canvas.height=H*scale;
const ctx=canvas.getContext("2d");
ctx.scale(scale,scale);
const grad=ctx.createLinearGradient(0,0,W,H);
grad.addColorStop(0,"#0a0000"); grad.addColorStop(1,"#180505");
ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
ctx.strokeStyle=tt.color+"80"; ctx.lineWidth=2; ctx.strokeRect(1,1,W-2,H-2);
ctx.strokeStyle=tt.color+"30"; ctx.beginPath(); ctx.moveTo(28,96); ctx.lineTo(W-28,96); ctx.stroke();
ctx.strokeStyle=tt.color+"20"; ctx.beginPath(); ctx.moveTo(28,H-56); ctx.lineTo(W-28,H-56); ctx.stroke();

ctx.textBaseline="alphabetic";
ctx.fillStyle=tt.color; ctx.font="700 15px 'Barlow Condensed', sans-serif";
ctx.fillText("🥊 SANGRE NUEVA · LA VELADA", 32, 38);
ctx.fillStyle="#e8ddd0"; ctx.font="400 46px 'Bebas Neue', sans-serif";
ctx.fillText(ticket.attendeeName.toUpperCase(), 32, 78);

ctx.textAlign="right"; ctx.font="400 32px sans-serif";
ctx.fillText(tt.icon, W-32, 44);
ctx.fillStyle=tt.color; ctx.font="700 15px 'Barlow Condensed', sans-serif";
ctx.fillText(tt.label.toUpperCase(), W-32, 76);
ctx.textAlign="left";

const qrCanvas=qrWrapRef.current?.querySelector("canvas");
const qrSize=220, qrX=32, qrY=126;
ctx.fillStyle="#fff"; ctx.beginPath();
ctx.roundRect?ctx.roundRect(qrX-8,qrY-8,qrSize+16,qrSize+16,12):ctx.rect(qrX-8,qrY-8,qrSize+16,qrSize+16);
ctx.fill();
if(qrCanvas) ctx.drawImage(qrCanvas,qrX,qrY,qrSize,qrSize);

const rows=[["Boleta","#"+ticket.id],["Precio",fmt$(ticket.price)],["Pago",ticket.paymentMethod],["Estado",ticket.status==="ingresado"?"✓ Ingresado":"● Activo"]];
let ry=150;
rows.forEach(([label,value])=>{
ctx.fillStyle="#9CA3AF"; ctx.font="400 15px 'Barlow Condensed', sans-serif";
ctx.fillText(label, qrX+qrSize+40, ry);
ctx.fillStyle=label==="Boleta"?"#e8ddd0":(label==="Precio"?tt.color:(label==="Estado"?(ticket.status==="ingresado"?"#4ADE80":"#FCD34D"):"#e8ddd0"));
ctx.font=label==="Boleta"?"400 26px 'Bebas Neue', sans-serif":"700 17px 'Barlow Condensed', sans-serif";
ctx.fillText(value, qrX+qrSize+40, ry+26);
ry+=62;
});

ctx.fillStyle="#6B7280"; ctx.font="700 12px 'Barlow Condensed', sans-serif";
ctx.fillText("SANGRE NUEVA", 32, H-24);
ctx.textAlign="right"; ctx.fillText("#"+ticket.id, W-32, H-24); ctx.textAlign="left";
return canvas;
}

async function shareTicket(){
if(busyRef.current) return;
busyRef.current=true;
setSharing(true);
try{
const canvas=await buildTicketCanvas();
if(navigator.canShare && navigator.share){
const blob=await new Promise(res=>canvas.toBlob(res,"image/png"));
const file=new File([blob],"entrada-"+ticket.id+".png",{type:"image/png"});
if(navigator.canShare({files:[file]})){
await navigator.share({files:[file],title:"Entrada Sangre Nueva"});
return;
}
}
const a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download="entrada-"+ticket.id+".png";
a.click();
return;
}catch(e){
if(e&&e.name==="AbortError")return;
window.open("https://wa.me/?text="+encodeURIComponent(shareText),"_blank");
return;
}finally{
setSharing(false);
busyRef.current=false;
}
}
return(
<div className="space-y-3">
<div className="rounded-2xl overflow-hidden scale-in" style={{border:"1px solid "+tt.color+"50",background:"linear-gradient(135deg,#0a0000,#180505)"}}>

<div>

</div>

</div>

<div className="flex-1 space-y-2">
<div className="flex justify-between"><span className="text-gray-400 text-xs">Boleta</span><span className="font-black text-white text-base" style={{fontFamily:"'Bebas Neue',Impact,sans-serif",letterSpacing:"1px"}}>#{ticket.id}</span></div>
<div className="flex justify-between"><span className="text-gray-400 text-xs">Precio</span><span className="font-bold text-sm" style={{color:tt.color}}>{fmt$(ticket.price)}</span></div>
<div className="flex justify-between"><span className="text-gray-400 text-xs">Pago</span><span className="text-white text-xs">{ticket.paymentMethod}</span></div>
<div className="flex justify-between"><span className="text-gray-400 text-xs">Estado</span>
<span className="text-[10px] font-bold px-2 py-0.5 rounded-full" style={ticket.status==="ingresado"?{background:"rgba(34,197,94,0.15)",color:"#4ADE80"}:{background:"rgba(245,158,11,0.15)",color:"#FCD34D"}}>{ticket.status==="ingresado"?"✓ Ingresado":"● Activo"}</span>
</div>
</div>
</div>
<div className="px-4 pb-2 flex justify-between" style={{borderTop:"1px solid "+tt.color+"15"}}>
<span className="text-[9px] text-gray-600 uppercase tracking-widest">Sangre Nueva</span>
<span className="text-[9px] text-gray-600">#{ticket.id}</span>
</div>
</div>
<button onClick={shareTicket} type="button" disabled={sharing} className="w-full py-2.5 rounded-xl text-sm font-bold text-white flex items-center justify-center gap-2 transition-all active:scale-95 disabled:opacity-60" style={{background:"rgba(34,197,94,0.15)",border:"1px solid rgba(34,197,94,0.4)"}}>{sharing?"Preparando imagen...":"📤 Compartir voucher"}</button>
</div>
);
}

setScanning(false);
if(rafRef.current){cancelAnimationFrame(rafRef.current);rafRef.current=null;}
if(streamRef.current){streamRef.current.getTracks().forEach(tr=>tr.stop());streamRef.current=null;}
}
function tick(){
const v=videoRef.current;
if(!v||v.readyState!==v.HAVE_ENOUGH_DATA){rafRef.current=requestAnimationFrame(tick);return;}
const canvas=canvasRef.current;
canvas.width=v.videoWidth; canvas.height=v.videoHeight;
const ctx=canvas.getContext("2d");
ctx.drawImage(v,0,0,canvas.width,canvas.height);
const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
const code=window.jsQR?window.jsQR(imageData.data,imageData.width,imageData.height):null;
if(code&&code.data){
const ticketId=extractTicketCode(code.data);
setInput(ticketId.toUpperCase());
lookup(ticketId);
stopScan();
return;
}
rafRef.current=requestAnimationFrame(tick);
}
function startScan(){
setScanErr(""); setResult(null);
navigator.mediaDevices?.getUserMedia({video:{facingMode:"environment"}}).then(stream=>{
streamRef.current=stream;
setScanning(true);
setTimeout(()=>{
if(videoRef.current){videoRef.current.srcObject=stream;videoRef.current.play();rafRef.current=requestAnimationFrame(tick);}
},0);
}).catch(e=>{setScanErr("No se pudo acceder a la cámara: "+e.message);});

// ERROR BOUNDARY
// Atrapa errores de renderizado de cualquier componente hijo para evitar
// que un fallo puntual (ej: un dato inesperado) tumbe toda la app y deje
// pantalla negra. Los datos ya guardados no se pierden (viven en
// localStorage/Firebase, no en este estado de React).
// ============================================
class ErrorBoundary extends React.Component{
constructor(props){super(props);this.state={hasError:false};}
static getDerivedStateFromError(error){return {hasError:true};}
componentDidCatch(error,info){console.error("Error capturado por ErrorBoundary:",error,info);}
render(){
if(this.state.hasError){
return (
<div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px",textAlign:"center",background:"#080608",color:"#e8ddd0"}}>
<div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"30px",letterSpacing:"0.05em",color:"#c42438",marginBottom:"14px"}}>Algo salió mal</div>
<p style={{color:"#9CA3AF",fontSize:"14px",maxWidth:"320px",marginBottom:"22px",lineHeight:1.5}}>La app tuvo un error inesperado al mostrar esta pantalla. Tus datos están a salvo (se guardan en la nube), no se perdió nada. Recarga para continuar.</p>
<button onClick={()=>location.reload()} style={{background:"#9b1a2a",color:"#e8ddd0",padding:"12px 32px",border:"none",fontFamily:"'Bebas Neue',sans-serif",fontSize:"18px",letterSpacing:"0.1em",cursor:"pointer"}}>Recargar</button>
</div>
);
}
return this.props.children;
}
}

<script>
// Registra el service worker solo si la página corre en https o localhost.
// En file:// (doble clic al abrir el archivo) esto no hace nada, para no romper esa forma de uso.
(function () {
  const isSecureHost =
    location.protocol === "https:" ||
    location.hostname === "localhost" ||
    location.hostname === "127.0.0.1";
  if (isSecureHost && "serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function (err) {
        console.warn("No se pudo registrar el service worker:", err);
      });
    });
  }
})();
</script>
